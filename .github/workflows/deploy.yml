name: deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "infra/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: ai-ops-rg
  ACR_NAME: ${{ vars.ACR_NAME }}
  API_APP: ai-ops-api
  WEB_APP: ai-ops-web
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ACR builds the images server-side (no Docker needed on the runner).
      - name: Build & push API image
        run: az acr build --registry "$ACR_NAME" --image "ai-ops-api:$IMAGE_TAG" --image "ai-ops-api:latest" ./api

      - name: Build & push Web image
        run: az acr build --registry "$ACR_NAME" --image "ai-ops-web:$IMAGE_TAG" --image "ai-ops-web:latest" ./web

      # Deploy the Bicep template so infrastructure AND configuration (env vars, scale, RBAC) are
      # owned by source control. Passing the freshly built image tags means this also rolls out the
      # new images, replacing the previous image-only `containerapp update` steps. Idempotent: every
      # resource and role assignment uses a deterministic name, so re-running is a no-op when unchanged.
      - name: Deploy infrastructure & config (Bicep)
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              apiImage="$ACR_NAME.azurecr.io/ai-ops-api:$IMAGE_TAG" \
              webImage="$ACR_NAME.azurecr.io/ai-ops-web:$IMAGE_TAG" \
              deployRoleAssignments=false

      - name: Output web URL
        run: |
          FQDN=$(az containerapp show -n "$WEB_APP" -g "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "Web: https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
